name: Scraper świadectw

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Tryb zapisu'
        required: true
        default: 'shadow'
        type: choice
        options:
          - shadow
          - production
  # Schedule usunięty — trigger robi Supabase pg_cron co minutę przez workflow_dispatch
  # (GH Actions schedule dropował triggery; pg_cron + pg_net jest niezawodne)

concurrency:
  group: scraper-swiadectwa
  cancel-in-progress: true  # pg_cron triggeruje co 60s; job ~30s — nowy trigger zawsze ma świeżą sesję

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SHADOW_MODE: ${{ github.event.inputs.mode == 'shadow' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Uruchom scraper (1x — trigger przychodzi co minutę z pg_cron)
        run: npm run scrape:swiadectwa
