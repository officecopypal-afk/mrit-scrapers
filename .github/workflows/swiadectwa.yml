name: Scraper świadectw

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Tryb zapisu'
        required: true
        default: 'shadow'
        type: choice
        options:
          - shadow
          - production
  schedule:
    - cron: '*/15 * * * *'  # co 15 min — w środku pętla ~45 min (scrape co 90s)

concurrency:
  group: scraper-swiadectwa
  cancel-in-progress: true  # nowy cron cancel-uje stary — ciągła świeżość, bez queue piling

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SHADOW_MODE: ${{ github.event.inputs.mode == 'shadow' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Uruchom scraper w pętli do deadline (~45 min dla schedule, 1x dla dispatch)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DEADLINE=$(($(date +%s) + 2700))  # 45 min from now
          else
            DEADLINE=$(($(date +%s) + 10))    # ~1x dla dispatch
          fi
          i=0
          while [ $(date +%s) -lt $DEADLINE ]; do
            i=$((i + 1))
            echo "--- iteration $i @ $(date -u +%H:%M:%SZ) ---"
            npm run scrape:swiadectwa || echo "⚠️ iteration failed (continuing)"
            remaining=$((DEADLINE - $(date +%s)))
            if [ $remaining -gt 90 ]; then
              echo "💤 sleep 90s (remaining ${remaining}s)..."
              sleep 90
            else
              break
            fi
          done
          echo "✅ DONE — $i iterations total"
